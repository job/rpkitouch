name: C

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: install mandoc
      run: sudo apt install mandoc universal-ctags
    - name: install zlib1g-dev
      run: sudo apt install zlib1g-dev
    - name: make
      run: make
